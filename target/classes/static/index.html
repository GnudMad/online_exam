<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Thi Trắc Nghiệm Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
    .login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
    .logo { width: 80px; height: 80px; background: linear-gradient(135deg,#e94560,#0f3460);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 20px; }
    .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; }
    .form-control:focus { background: rgba(255,255,255,0.15); color: #fff;
      border-color: #e94560; box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.25); }
    .form-control::placeholder { color: rgba(255,255,255,0.5); }
    .btn-login { background: linear-gradient(135deg,#e94560,#c62a47); border: none;
      padding: 12px; font-size: 1.1rem; letter-spacing: 1px; }
    .demo-accounts { background: rgba(255,255,255,0.05); border-radius: 10px; }
    .demo-btn { cursor: pointer; transition: 0.2s; }
    .demo-btn:hover { background: rgba(233,69,96,0.2) !important; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="container" style="max-width:450px">
    <div class="login-card p-5 shadow-lg">
      <div class="text-center mb-4">
        <div class="logo"><i class="bi bi-mortarboard-fill text-white"></i></div>
        <h2 class="text-white fw-bold">Thi Trắc Nghiệm Online</h2>
        <p class="text-muted">Hệ thống thi nội bộ nhà trường</p>
      </div>
      <div id="error-msg" class="alert alert-danger d-none"></div>
      <div class="mb-3">
        <label class="text-white-50 mb-1">Tên đăng nhập</label>
        <input id="username" type="text" class="form-control" placeholder="Nhập username...">
      </div>
      <div class="mb-4">
        <label class="text-white-50 mb-1">Mật khẩu</label>
        <input id="password" type="password" class="form-control" placeholder="Nhập mật khẩu...">
      </div>
      <button class="btn btn-login text-white w-100 rounded-pill fw-bold" onclick="doLogin()">
        <i class="bi bi-box-arrow-in-right me-2"></i>ĐĂNG NHẬP
      </button>
      <hr class="text-white-50 my-4">
      <p class="text-white-50 text-center small mb-2">Tài khoản demo:</p>
      <div class="demo-accounts p-2">
        <div class="demo-btn text-center text-white-50 small p-1 rounded mb-1"
             onclick="fillDemo('admin','admin123')">
          👑 Admin: admin / admin123
        </div>
        <div class="demo-btn text-center text-white-50 small p-1 rounded mb-1"
             onclick="fillDemo('teacher1','teacher123')">
          📚 Giáo viên: teacher1 / teacher123
        </div>
        <div class="demo-btn text-center text-white-50 small p-1 rounded"
             onclick="fillDemo('student1','student123')">
          🎓 Học sinh: student1 / student123
        </div>
      </div>
    </div>
  </div>
  <script>
    function fillDemo(u, p) {
      document.getElementById('username').value = u;
      document.getElementById('password').value = p;
    }
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errDiv = document.getElementById('error-msg');
      errDiv.classList.add('d-none');
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (!res.ok) { errDiv.textContent = data.error || 'Đăng nhập thất bại'; errDiv.classList.remove('d-none'); return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        const role = data.role;
        if (role === 'ADMIN') location.href = '/pages/admin.html';
        else if (role === 'TEACHER') location.href = '/pages/teacher.html';
        else location.href = '/pages/student.html';
      } catch(e) {
        errDiv.textContent = 'Lỗi kết nối server'; errDiv.classList.remove('d-none');
      }
    }
    document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  </script>
</body>
</html>
