# =============================================
# Online Exam System - Application Properties
# =============================================

server.port=8080



# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ========================
# MySQL (Production) - uncomment and configure when needed
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/online_exam?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=VGhpcElzQVZlcnlMb25nU2VjcmV0S2V5Rm9yT25saW5lRXhhbVN5c3RlbTIwMjY=
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# Logging
logging.level.com.exam=INFO

# Fix JSON serialization of JPA lazy-loaded entities
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jpa.open-in-view=true
